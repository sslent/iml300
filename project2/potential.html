<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Obachan & Me</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                overflow: hidden;
                cursor: crosshair;
            }

            canvas {
                display: block;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <script>
            const canvas = document.getElementById("c");
            const ctx = canvas.getContext("2d");
            let W, H;
            const mouse = {
                x: -9999,
                y: -9999
            };

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener("resize", resize);
            window.addEventListener("mousemove", (e) => {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            });
            window.addEventListener("mouseleave", () => {
                mouse.x = -9999;
                mouse.y = -9999;
            });

            function sampleImage(img) {
                // Fit image to screen
                const aspect = img.naturalWidth / img.naturalHeight;
                let fitW, fitH;
                if (W / H > aspect) {
                    fitH = H;
                    fitW = H * aspect;
                } else {
                    fitW = W;
                    fitH = W / aspect;
                }
                const offX = (W - fitW) / 2;
                const offY = (H - fitH) / 2;

                // Draw image to offscreen at full screen resolution
                const off = document.createElement("canvas");
                off.width = W;
                off.height = H;
                const oCtx = off.getContext("2d");
                oCtx.fillStyle = "#000";
                oCtx.fillRect(0, 0, W, H);
                oCtx.drawImage(img, offX, offY, fitW, fitH);
                const data = oCtx.getImageData(0, 0, W, H).data;

                // Grid-based sampling: divide screen into small cells,
                // place a star in each cell weighted by brightness
                const CELL = 4;
                // one star per NxN pixel cell = very dense grid
                const cols = Math.floor(W / CELL);
                const rows = Math.floor(H / CELL);
                const pts = [];

                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        // Average brightness in this cell
                        let totalLum = 0,
                            count = 0;
                        for (let dy = 0; dy < CELL; dy++) {
                            for (let dx = 0; dx < CELL; dx++) {
                                const px = col * CELL + dx;
                                const py = row * CELL + dy;
                                if (px >= W || py >= H) continue;
                                const i = py * W + px;
                                const lum =
                                    (0.299 * data[i * 4] + 0.587 * data[i * 4 + 1] + 0.114 * data[i * 4 + 2]) / 255;
                                totalLum += lum;
                                count++;
                            }
                        }
                        const avgLum = count > 0 ? totalLum / count : 0;

                        // Only place a star if bright enough — threshold removes dark background
                        if (avgLum > 0.08) {
                            // Jitter within cell
                            pts.push({
                                x: col * CELL + CELL / 2 + (Math.random() - 0.5) * CELL * 0.7,
                                y: row * CELL + CELL / 2 + (Math.random() - 0.5) * CELL * 0.7,
                                lum: avgLum
                            });
                        }
                    }
                }
                return pts;
            }

            const COLORS = ["#ffffff", "#fffef5", "#fff9ee", "#f8f8ff", "#fffff8", "#fefefe"];

            class Star {
                constructor(pt) {
                    this.hx = pt.x;
                    this.hy = pt.y;
                    this.x = pt.x;
                    this.y = pt.y;
                    this.lum = pt.lum;
                    this.vx = 0;
                    this.vy = 0;
                    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                    // Brighter pixels = slightly larger stars
                    this.size = 0.3 + pt.lum * 1.1 + Math.random() * 0.4;
                    this.seed = Math.random() * 100;
                    this.twinkle = Math.random() * 0.03 + 0.005;
                    this.flowSpeed = Math.random() * 0.1 + 0.02;
                    this.released = false;
                }

                update(t, forming) {
                    if (forming) {
                        // Snap to home with strong spring
                        const dx = this.hx - this.x;
                        const dy = this.hy - this.y;
                        this.vx += dx * 0.12;
                        this.vy += dy * 0.12;
                        this.vx *= 0.7;
                        this.vy *= 0.7;
                    } else {
                        // Flow field
                        const nx = (this.x / W) * 3,
                            ny = (this.y / H) * 3;
                        const angle =
                            (Math.sin(nx * 1.2 + t * 0.00035) +
                                Math.cos(ny * 1.0 + t * 0.00028) +
                                Math.sin((nx + ny) * 0.9 + t * 0.00045)) *
                            Math.PI;
                        this.vx += Math.cos(angle) * 0.003 * this.flowSpeed;
                        this.vy += Math.sin(angle) * 0.003 * this.flowSpeed;
                        this.vx *= 0.97;
                        this.vy *= 0.97;

                        // Wrap
                        if (this.x < -10) this.x = W + 10;
                        if (this.x > W + 10) this.x = -10;
                        if (this.y < -10) this.y = H + 10;
                        if (this.y > H + 10) this.y = -10;
                    }

                    // Mouse repulsion always active
                    const mdx = this.x - mouse.x,
                        mdy = this.y - mouse.y;
                    const md2 = mdx * mdx + mdy * mdy;
                    const R = 100;
                    if (md2 < R * R && md2 > 0.1) {
                        const md = Math.sqrt(md2);
                        const f = ((R - md) / R) * 4.0;
                        this.vx += (mdx / md) * f;
                        this.vy += (mdy / md) * f;
                    }

                    this.x += this.vx;
                    this.y += this.vy;
                }

                draw(t, forming) {
                    // While forming: opacity driven by luminance = photo looks real
                    // After release: gentle twinkle
                    let alpha;
                    if (forming) {
                        alpha = 0.4 + this.lum * 0.6;
                    } else {
                        alpha = (0.3 + this.lum * 0.5) * (0.7 + Math.sin(t * this.twinkle + this.seed) * 0.3);
                    }

                    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
                    ctx.fillStyle = this.color;
                    const r = Math.max(
                        0.1,
                        this.size * (forming ? 1.0 : 0.85 + Math.sin(t * this.twinkle * 1.3 + this.seed) * 0.15)
                    );
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            let stars = [];
            let forming = true;
            let formingTimer = 0;
            const FORM_DURATION = 400;
            // hold portrait for ~6s at 60fps

            // Paper grain
            const paperCanvas = document.createElement("canvas");
            const pCtx = paperCanvas.getContext("2d");
            function buildPaper() {
                paperCanvas.width = W;
                paperCanvas.height = H;
                for (let i = 0; i < 20000; i++) {
                    const px = Math.random() * W,
                        py = Math.random() * H;
                    const len = Math.random() * 3 + 1,
                        a = Math.random() * Math.PI;
                    pCtx.strokeStyle = `rgba(255,255,255,${Math.random() * 0.01})`;
                    pCtx.lineWidth = Math.random() * 0.5 + 0.2;
                    pCtx.beginPath();
                    pCtx.moveTo(px, py);
                    pCtx.lineTo(px + Math.cos(a) * len, py + Math.sin(a) * len);
                    pCtx.stroke();
                }
            }
            buildPaper();

            let t = 0;
            function frame() {
                // While forming hold a solid dark bg so portrait is crisp
                if (forming) {
                    ctx.fillStyle = "rgba(0,0,0,0.6)";
                } else {
                    ctx.fillStyle = "rgba(0,0,0,0.12)";
                }
                ctx.fillRect(0, 0, W, H);

                if (forming) {
                    formingTimer++;
                    if (formingTimer > FORM_DURATION) forming = false;
                }

                for (const s of stars) {
                    s.update(t, forming);
                    s.draw(t, forming);
                }

                ctx.globalAlpha = 0.18;
                ctx.drawImage(paperCanvas, 0, 0);
                ctx.globalAlpha = 1;

                t++;
                requestAnimationFrame(frame);
            }

            const img = new Image();
            img.onload = () => {
                const pts = sampleImage(img);
                console.log("Star count:", pts.length);
                stars = pts.map((p) => new Star(p));
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, W, H);
                frame();
            };
