<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Dear Miyoko</title>
        <link rel="stylesheet" href="page3style.css" />
    </head>
    <body>
        <div class="words-container">
            <img class="word-img" src="Apologize.png" alt="Apologize" />
            <img class="word-img" src="Frustrating.png" alt="Frustration" />
            <img class="word-img" src="Loss.png" alt="Loss" />
            <img class="word-img" src="Love.png" alt="Love" />
            <img class="word-img" src="Painfulmemories.png" alt="Painful Memories" />
            <img class="word-img" src="Myth.png" alt="Myth" />
            <img class="word-img" src="Potentialanddestiny.png" alt="Potential and Destiny" />
        </div>

        <script>
            const positions = [
                { top: "8%", left: "10%", rotate: "-8deg" },
                { top: "6%", left: "42%", rotate: "4deg" },
                { top: "10%", left: "72%", rotate: "-5deg" },
                { top: "40%", left: "5%", rotate: "7deg" },
                { top: "38%", left: "42%", rotate: "-10deg" },
                { top: "42%", left: "74%", rotate: "6deg" },
                { top: "72%", left: "38%", rotate: "-4deg" }
            ];

            const imgs = document.querySelectorAll(".word-img");
            imgs.forEach((img, i) => {
                img.style.position = "absolute";
                img.style.top = positions[i].top;
                img.style.left = positions[i].left;
                img.style.transform = `rotate(${positions[i].rotate})`;
            });
        </script>
    </body>
</html>
